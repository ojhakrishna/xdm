<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XDM - Connection Error</title>
  <script src="error.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="popup-header">
    <div class="header-brand">
      <span class="header-icon">⬇</span>
      <span>XDM Integration Module</span>
    </div>
    <span class="status-dot status-offline" title="Disconnected"></span>
  </div>
  <div class="error-container">
    <div class="error-icon">⚠</div>
    <div class="error-msg">
      <p>Unable to connect with XDM</p>
      <p class="error-hint">Please make sure XDM is running</p>
    </div>
    <button class="primary-button" id="OpenLink" aria-label="Launch XDM application">
      Launch XDM
    </button>
  </div>
</body>

</html>
