<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XDM - Monitoring Disabled</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="popup-header">
    <div class="header-brand">
      <span class="header-icon">⬇</span>
      <span>XDM Integration Module</span>
    </div>
    <span class="status-dot status-offline" title="Disabled"></span>
  </div>
  <div class="disabled-container">
    <div class="disabled-icon">⏸</div>
    <p>Browser monitoring is disabled in XDM application</p>
    <p class="disabled-hint">Enable it from XDM Settings → Browser Monitoring</p>
  </div>
</body>

</html>
