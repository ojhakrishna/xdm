<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XDM - Video Downloads</title>
  <script src="popup.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Header with connection status -->
  <div class="popup-header">
    <div class="header-brand">
      <span class="header-icon">⬇</span>
      <span>XDM Integration Module</span>
    </div>
    <span id="statusDot" class="status-dot status-online" title="Connected to XDM"></span>
  </div>

  <!-- Loading state (shown while connecting) -->
  <div id="loading" class="loading-container" style="display: none;">
    <div class="spinner"></div>
    <span class="loading-text">Connecting to XDM...</span>
  </div>

  <!-- Main content -->
  <div id="content">
    <!-- Empty state (shown when no videos) -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-state-icon">🎬</div>
      <div class="empty-state-text">No videos detected yet.<br>Play a video in the browser to see it here.</div>
    </div>

    <!-- Video list -->
    <div id="list" class="video-list">
      <table id="table"></table>
    </div>

    <!-- Action buttons -->
    <div class="action-bar">
      <button id="format" class="flat-button" aria-label="Show more video formats">More formats</button>
      <div class="action-divider"></div>
      <button id="clear" class="flat-button" aria-label="Clear all detected videos">Clear items</button>
    </div>
  </div>

  <!-- Footer with monitoring toggle -->
  <div class="popup-footer">
    <span class="footer-label">Browser monitoring</span>
    <label class="toggle-switch" aria-label="Toggle browser download monitoring">
      <input type="checkbox" id="chk">
      <span class="toggle-slider"></span>
    </label>
  </div>
</body>

</html>
